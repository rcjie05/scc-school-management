<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Saint Cecilia College</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #67C4A7 0%, #5B4E9B 100%);
            position: relative;
            overflow: hidden;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            top: -30%; left: -10%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(244,201,107,0.2), transparent);
            border-radius: 50%;
        }
        .auth-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            position: relative;
            z-index: 1;
        }
        .auth-card {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .auth-card-header { text-align: center; margin-bottom: 2rem; }
        .auth-card-header h2 { font-size: 2rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem; }
        .auth-card-header p  { color: var(--text-secondary); font-size: 0.875rem; }
        .auth-form { display: flex; flex-direction: column; gap: 1.5rem; }
        .form-row  { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .alert { padding: 1rem; border-radius: 12px; font-size: 0.875rem; margin-bottom: 1rem; }
        .alert-error   { background: rgba(232,155,167,0.2); color: #C81E1E; border: 1px solid rgba(200,30,30,0.3); }
        .alert-success { background: rgba(103,196,167,0.2); color: #0E9F6E; border: 1px solid rgba(14,159,110,0.3); }
        .auth-footer { text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--border-color); }
        .auth-footer a { color: var(--primary-purple); text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { text-decoration: underline; }

        /* Progress steps */
        .progress-steps { display: flex; justify-content: space-between; margin-bottom: 2rem; }
        .step { flex: 1; text-align: center; position: relative; }
        .step::after { content:''; position:absolute; top:20px; left:50%; width:100%; height:2px; background:var(--border-color); z-index:0; }
        .step:last-child::after { display:none; }
        .step-number { width:40px; height:40px; border-radius:50%; background:var(--border-color); color:var(--text-secondary); display:inline-flex; align-items:center; justify-content:center; font-weight:700; margin-bottom:0.5rem; position:relative; z-index:1; }
        .step.active .step-number { background:var(--primary-purple); color:white; }
        .step-label { font-size:0.75rem; color:var(--text-secondary); }

        /* Course loading state */
        .select-loading { position:relative; }
        .select-loading::after {
            content:'';
            position:absolute; right:2.5rem; top:50%; transform:translateY(-50%);
            width:14px; height:14px;
            border:2px solid #e5e7eb; border-top-color:var(--primary-purple);
            border-radius:50%; animation:spin .7s linear infinite;
        }
        @keyframes spin { to { transform:translateY(-50%) rotate(360deg); } }

        /* Section field enhancements */
        .field-label-row { display:flex; align-items:center; gap:.5rem; margin-bottom:.4rem; }
        .field-label-row .form-label { margin:0; }
        .count-badge {
            display:none; background:#ede9fe; color:#5b21b6;
            font-size:.72rem; font-weight:700; padding:.1rem .5rem; border-radius:.8rem;
        }
        .count-badge.show { display:inline-block; }

        .spinner-row {
            display:none; align-items:center; gap:.5rem;
            font-size:.82rem; color:var(--text-secondary); margin-top:.4rem;
        }
        .spinner-row.show { display:flex; }
        .spinner { width:14px; height:14px; border:2px solid #e5e7eb; border-top-color:var(--primary-purple); border-radius:50%; animation:spin .7s linear infinite; }

        .field-hint { font-size:.8rem; margin-top:.4rem; padding:.45rem .75rem; border-radius:8px; display:none; }
        .field-hint.show { display:block; }
        .hint-info    { background:#ede9fe; color:#5b21b6; }
        .hint-warning { background:#fef3c7; color:#92400e; }
        .hint-success { background:#dcfce7; color:#166534; }

        .form-select.ready { border-color:#5B4E9B; }

        /* Course code tag inside select label */
        .course-meta { font-size:.75rem; color:var(--text-secondary); margin-top:.15rem; }

        @media (max-width:768px) {
            .form-row { grid-template-columns:1fr; }
            .progress-steps { flex-direction:column; gap:1rem; }
            .step::after { display:none; }
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-right">
        <div class="auth-card">
            <div class="auth-card-header">
                <h2>Student Registration</h2>
                <p>Create your account to begin enrollment</p>
            </div>

            <div class="progress-steps">
                <div class="step active"><div class="step-number">1</div><div class="step-label">Personal Info</div></div>
                <div class="step active"><div class="step-number">2</div><div class="step-label">Academic Info</div></div>
                <div class="step"><div class="step-number">3</div><div class="step-label">Account Setup</div></div>
            </div>

            <div id="alertContainer"></div>

            <form class="auth-form" id="registerForm">

                <!-- Personal Info -->
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="name">Full Name *</label>
                        <input type="text" id="name" name="name" class="form-input" placeholder="Juan Dela Cruz" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="student_id">Student ID / LRN *</label>
                        <input type="text" id="student_id" name="student_id" class="form-input" placeholder="2024-00001" required>
                    </div>
                </div>

                <!-- Course & Year Level -->
                <div class="form-row">
                    <div class="form-group">
                        <div class="field-label-row">
                            <label class="form-label" for="course">Course / Program *</label>
                            <span id="courseLoadingBadge" class="count-badge">Loading…</span>
                        </div>
                        <div id="courseSelectWrap">
                            <select id="course" name="course" class="form-select" required onchange="onCourseChange()" disabled>
                                <option value="">Loading courses…</option>
                            </select>
                        </div>
                        <div class="field-hint" id="courseHint"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="year_level">Year Level *</label>
                        <select id="year_level" name="year_level" class="form-select" required onchange="fetchSections()">
                            <option value="">Select Year</option>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                            <option value="4th Year">4th Year</option>
                        </select>
                    </div>
                </div>

                <!-- Section (dynamic) -->
                <div class="form-group">
                    <div class="field-label-row">
                        <label class="form-label" for="section_id">Section *</label>
                        <span id="sectionCountBadge" class="count-badge"></span>
                    </div>
                    <select id="section_id" name="section_id" class="form-select" disabled>
                        <option value="">— Select Course &amp; Year Level first —</option>
                    </select>
                    <div class="spinner-row" id="sectionSpinner">
                        <div class="spinner"></div><span>Loading available sections…</span>
                    </div>
                    <div class="field-hint" id="sectionHint"></div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label class="form-label" for="email">Email Address *</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="student@school.edu" required>
                </div>

                <!-- Password -->
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="password">Password *</label>
                        <input type="password" id="password" name="password" class="form-input" placeholder="Minimum 8 characters" required minlength="8">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="confirm_password">Confirm Password *</label>
                        <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Re-enter password" required>
                    </div>
                </div>

                <!-- Terms -->
                <div class="form-group">
                    <label style="display:flex;align-items:start;gap:.5rem;cursor:pointer;">
                        <input type="checkbox" name="terms" required style="width:auto;margin-top:.25rem;">
                        <span style="font-size:.875rem;color:var(--text-secondary);">
                            I agree to the <a href="#" style="color:var(--primary-purple);">Terms and Conditions</a>
                            and <a href="#" style="color:var(--primary-purple);">Privacy Policy</a>
                        </span>
                    </label>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary" style="width:100%;justify-content:center;">
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                <p style="font-size:.875rem;color:var(--text-secondary);">
                    Already have an account? <a href="login.html">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
/* ── Hint helpers ───────────────────────────────── */
function showHint(elId, type, text) {
    const el = document.getElementById(elId);
    el.className = `field-hint show hint-${type}`;
    el.textContent = text;
}
function hideHint(elId) {
    const el = document.getElementById(elId);
    el.className = 'field-hint';
    el.textContent = '';
}
function setBadge(elId, text) {
    const el = document.getElementById(elId);
    if (text) { el.textContent = text; el.classList.add('show'); }
    else       { el.classList.remove('show'); }
}
function setSpinner(on) {
    document.getElementById('sectionSpinner').classList.toggle('show', on);
}

/* ── Load courses from DB on page load ─────────── */
async function loadCourses() {
    const sel   = document.getElementById('course');
    const badge = document.getElementById('courseLoadingBadge');
    badge.textContent = 'Loading…';
    badge.classList.add('show');

    try {
        const res  = await fetch('php/api/get_courses_public.php');
        const data = await res.json();

        sel.innerHTML = '<option value="">— Select Course / Program —</option>';

        if (!data.success || data.courses.length === 0) {
            // Fallback to static list if courses table empty or missing
            const fallback = [
                'Computer Science','Information Technology',
                'Business Administration','Engineering','Education','Nursing'
            ];
            fallback.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                sel.appendChild(opt);
            });
            showHint('courseHint', 'warning', 'Course list could not be loaded from database. Showing default options.');
            badge.classList.remove('show');
        } else {
            data.courses.forEach(c => {
                const opt = document.createElement('option');
                opt.value              = c.course_name;
                opt.dataset.code       = c.course_code;
                opt.dataset.duration   = c.duration_years;
                opt.textContent        = `${c.course_name} (${c.course_code})`;
                sel.appendChild(opt);
            });
            setBadge('courseLoadingBadge', `${data.courses.length} courses`);
            showHint('courseHint', 'info', `${data.courses.length} active course(s) available. Please select your program.`);
        }

        sel.disabled = false;
        sel.classList.add('ready');

    } catch (e) {
        // Fallback
        const fallback = [
            'Computer Science','Information Technology',
            'Business Administration','Engineering','Education','Nursing'
        ];
        sel.innerHTML = '<option value="">— Select Course / Program —</option>';
        fallback.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.textContent = c;
            sel.appendChild(opt);
        });
        sel.disabled = false;
        showHint('courseHint', 'warning', 'Could not connect to course database. Showing default list.');
        badge.classList.remove('show');
    }
}

/* ── When course changes ─────────────────────── */
function onCourseChange() {
    const sel = document.getElementById('course');
    const opt = sel.options[sel.selectedIndex];

    if (!sel.value) {
        hideHint('courseHint');
    } else {
        const code     = opt.dataset.code     ? ` (${opt.dataset.code})`       : '';
        const duration = opt.dataset.duration  ? ` · ${opt.dataset.duration}-year program` : '';
        showHint('courseHint', 'success', `Selected: ${sel.value}${code}${duration}`);
    }

    // Also update year_level max options based on duration
    const duration = parseInt(opt.dataset.duration) || 4;
    const yearSel  = document.getElementById('year_level');
    const labels   = ['1st Year','2nd Year','3rd Year','4th Year','5th Year','6th Year'];
    yearSel.innerHTML = '<option value="">Select Year</option>';
    for (let i = 0; i < Math.min(duration, labels.length); i++) {
        const o = document.createElement('option');
        o.value = labels[i]; o.textContent = labels[i];
        yearSel.appendChild(o);
    }

    fetchSections();
}

/* ── Fetch sections dynamically ─────────────── */
let abortCtrl = null;

async function fetchSections() {
    const course    = document.getElementById('course').value;
    const yearLevel = document.getElementById('year_level').value;
    const sel       = document.getElementById('section_id');

    sel.innerHTML = '<option value="">— loading… —</option>';
    sel.disabled  = true;
    sel.classList.remove('ready');
    setBadge('sectionCountBadge', null);
    hideHint('sectionHint');

    if (!course || !yearLevel) {
        sel.innerHTML = '<option value="">— Select Course &amp; Year Level first —</option>';
        return;
    }

    if (abortCtrl) abortCtrl.abort();
    abortCtrl = new AbortController();
    setSpinner(true);

    try {
        const qs   = new URLSearchParams({ course, year_level: yearLevel });
        const res  = await fetch(`php/api/get_sections_public.php?${qs}`, { signal: abortCtrl.signal });
        const data = await res.json();
        setSpinner(false);

        if (!data.success || data.sections.length === 0) {
            sel.innerHTML = '<option value="">— No sections available —</option>';
            sel.disabled  = true;
            sel.removeAttribute('required');
            showHint('sectionHint', 'warning', `No active sections found for ${yearLevel} – ${course}. Please contact the registrar.`);
            return;
        }

        sel.innerHTML = '<option value="">— Select your section —</option>';
        data.sections.forEach(s => {
            const opt = document.createElement('option');
            opt.value            = s.id;
            opt.dataset.code     = s.section_code;
            opt.dataset.name     = s.section_name;
            opt.dataset.semester = s.semester    || '';
            opt.dataset.sy       = s.school_year || '';
            let label = `${s.section_name} (${s.section_code})`;
            if (s.semester)    label += ` · ${s.semester}`;
            if (s.school_year) label += ` · ${s.school_year}`;
            opt.textContent = label;
            sel.appendChild(opt);
        });

        sel.disabled = false;
        sel.setAttribute('required', '');
        sel.classList.add('ready');
        const cnt = data.sections.length;
        setBadge('sectionCountBadge', `${cnt} available`);
        showHint('sectionHint', 'success', `${cnt} section(s) found. Please choose your section.`);

    } catch (err) {
        if (err.name === 'AbortError') return;
        setSpinner(false);
        sel.innerHTML = '<option value="">— Error loading sections —</option>';
        showHint('sectionHint', 'warning', 'Could not load sections. Please refresh and try again.');
    }
}

/* ── Section selection confirmation hint ──── */
document.getElementById('section_id').addEventListener('change', function () {
    if (!this.value) { hideHint('sectionHint'); return; }
    const opt   = this.options[this.selectedIndex];
    const extra = [opt.dataset.semester, opt.dataset.sy].filter(Boolean).join(' · ');
    showHint('sectionHint', 'info', `You selected: ${opt.dataset.name} (${opt.dataset.code})${extra ? '  ·  ' + extra : ''}`);
});

/* ── Form submit ────────────────────────── */
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertBox  = document.getElementById('alertContainer');
    const formData  = new FormData(e.target);
    const submitBtn = document.getElementById('submitBtn');

    if (formData.get('password') !== formData.get('confirm_password')) {
        alertBox.innerHTML = '<div class="alert alert-error">Passwords do not match!</div>';
        return;
    }

    const sectionSel = document.getElementById('section_id');
    if (!sectionSel.disabled && !sectionSel.value) {
        alertBox.innerHTML = '<div class="alert alert-error">Please select your section.</div>';
        sectionSel.focus();
        return;
    }

    submitBtn.disabled    = true;
    submitBtn.textContent = 'Registering…';

    try {
        const response = await fetch('php/register.php', { method:'POST', body:formData });
        const result   = await response.json();

        if (result.success) {
            alertBox.innerHTML = `
                <div class="alert alert-success">
                    Registration successful!<br>
                    <small>Please wait for approval from the registrar. Redirecting to login…</small>
                </div>`;
            setTimeout(() => { window.location.href = 'login.html'; }, 2500);
        } else {
            alertBox.innerHTML = `<div class="alert alert-error">${result.message}</div>`;
            submitBtn.disabled    = false;
            submitBtn.textContent = 'Create Account';
        }
    } catch (err) {
        alertBox.innerHTML = '<div class="alert alert-error">An error occurred. Please try again.</div>';
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Create Account';
    }
});

/* ── Init ─────────────────────────────── */
loadCourses();
</script>

</body>
</html>
